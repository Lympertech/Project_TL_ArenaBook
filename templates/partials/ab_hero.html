{% comment %}Επαναχρησιμοποιήσιμο γραφικό "γήπεδο τη νύχτα" — χωρίς εξωτερικές εικόνες.{% endcomment %}
<svg class="ab-hero__art" viewBox="0 0 480 220" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
        <linearGradient id="abSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0c1d33"/>
            <stop offset="0.55" stop-color="#11314a"/>
            <stop offset="1" stop-color="#12402c"/>
        </linearGradient>
        <linearGradient id="abGrass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1c6b3a"/>
            <stop offset="1" stop-color="#0f4d28"/>
        </linearGradient>
        <radialGradient id="abGlow" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#fdf6d8" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#fdf6d8" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="480" height="220" fill="url(#abSky)"/>

    <!-- λάμψη προβολέων -->
    <ellipse cx="90"  cy="40" rx="70" ry="46" fill="url(#abGlow)" opacity="0.6"/>
    <ellipse cx="390" cy="40" rx="70" ry="46" fill="url(#abGlow)" opacity="0.6"/>

    <!-- κερκίδα -->
    <rect x="0" y="92" width="480" height="26" fill="#16263a"/>
    <rect x="0" y="92" width="480" height="6"  fill="#1d3147"/>

    <!-- ιστοί προβολέων -->
    <g fill="#0a1622">
        <rect x="70"  y="20" width="6" height="78"/>
        <rect x="240" y="14" width="6" height="84"/>
        <rect x="404" y="20" width="6" height="78"/>
    </g>
    <g fill="#fdf6d8">
        <rect x="58"  y="14" width="30" height="9" rx="2"/>
        <rect x="228" y="8"  width="30" height="9" rx="2"/>
        <rect x="392" y="14" width="30" height="9" rx="2"/>
    </g>

    <!-- γρασίδι σε προοπτική -->
    <polygon points="0,118 480,118 480,220 0,220" fill="url(#abGrass)"/>
    <polygon points="60,118 420,118 480,220 0,220" fill="#16562c" opacity="0.45"/>

    <!-- γραμμές γηπέδου -->
    <g stroke="#dff3e4" stroke-width="2.4" fill="none" opacity="0.85">
        <line x1="240" y1="118" x2="240" y2="220"/>
        <ellipse cx="240" cy="170" rx="46" ry="22"/>
        <path d="M40 220 Q120 150 200 150"/>
        <path d="M440 220 Q360 150 280 150"/>
    </g>
    <circle cx="240" cy="170" r="3" fill="#dff3e4"/>
</svg>
