{% extends "base.html" %}

{% block content %}
<h1 class="h3 mb-2">UC-08 Manage Booking Rules</h1>
<p class="mb-3">{{ facility.name }}</p>
<p class="mb-4">
    Define the booking price for all days, allowed time window, notice period, duration limit and modification limit for this facility.
</p>

<form method="post" class="col-md-8 col-lg-6" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Save Rules</button>
    <a class="btn btn-outline-secondary" href="{% url 'facilities:manager_dashboard' %}">Cancel</a>
</form>
{% endblock %}
